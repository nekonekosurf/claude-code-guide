<style>
/* テーブル改善 */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
}
th, td {
  padding: 8px 12px;
  border: 1px solid #d0d7de;
  text-align: left;
}
th {
  background: #f6f8fa;
  font-weight: 600;
}
tr:nth-child(even) {
  background: #f6f8fa;
}

/* セクション区切り */
h2 {
  margin-top: 3em;
  padding-top: 1.5em;
  border-top: 2px solid #d0d7de;
}

/* コードブロック: 折りたたみ対応 */
pre {
  max-height: 400px;
  overflow-y: auto;
  position: relative;
}
.code-wrapper {
  position: relative;
  margin: 1em 0;
}
.code-wrapper.collapsed pre {
  max-height: 80px;
  overflow: hidden;
}
.code-toggle {
  display: block;
  width: 100%;
  padding: 6px;
  background: #f0f3f6;
  border: 1px solid #d0d7de;
  border-top: none;
  border-radius: 0 0 6px 6px;
  cursor: pointer;
  text-align: center;
  font-size: 0.85em;
  color: #0969da;
  font-weight: 600;
}
.code-toggle:hover {
  background: #e8ecf0;
}

/* ナビカード */
.nav-card {
  background: #f6f8fa;
  border: 1px solid #d0d7de;
  border-radius: 8px;
  padding: 1.2em 1.5em;
  margin: 1em 0;
  transition: box-shadow 0.2s;
}
.nav-card:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.nav-card h3 {
  margin-top: 0;
}

/* ページナビ */
.page-nav {
  background: #f6f8fa;
  padding: 0.8em 1.2em;
  border-radius: 6px;
  margin-bottom: 2em;
  font-size: 0.9em;
}

/* 目次折りたたみ */
details {
  margin: 1em 0;
  padding: 0.5em 1em;
  background: #f6f8fa;
  border: 1px solid #d0d7de;
  border-radius: 6px;
}
details summary {
  cursor: pointer;
  font-weight: 600;
  color: #0969da;
}
</style>
<script>
// コードブロック自動折りたたみ（5行以上）
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('pre').forEach(function(pre) {
    var lines = pre.textContent.split('\n').length;
    if (lines > 5) {
      var wrapper = document.createElement('div');
      wrapper.className = 'code-wrapper collapsed';
      pre.parentNode.insertBefore(wrapper, pre);
      wrapper.appendChild(pre);
      var btn = document.createElement('button');
      btn.className = 'code-toggle';
      btn.textContent = '▼ コードを展開 (' + lines + '行)';
      wrapper.appendChild(btn);
      btn.addEventListener('click', function() {
        var isCollapsed = wrapper.classList.toggle('collapsed');
        btn.textContent = isCollapsed ? '▼ コードを展開 (' + lines + '行)' : '▲ コードを折りたたむ';
      });
    }
  });
});
</script>
